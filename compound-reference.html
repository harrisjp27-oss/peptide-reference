<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compound Reference — Peptides &amp; Steroids</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0E1620; --ink-2:#1b2735; --paper:#F6F7F9; --surface:#ffffff;
    --line:#dfe3e8; --muted:#5b6776; --muted-2:#869; --accent:#0FA3A3;
    --tA:#1F9D6B; --tB:#2D7FD5; --tC:#C98A00; --tD:#E2701E; --tE:#C8402E; --flag:#C8402E;
    --mono:'IBM Plex Mono',ui-monospace,Menlo,Consolas,monospace;
    --sans:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; --r:10px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1180px;margin:0 auto}

  /* TAB BAR */
  .tabbar{position:sticky;top:0;z-index:50;background:var(--ink);border-bottom:1px solid #223}
  .tabbar{background:var(--ink)}
  .tabbar .wrap{display:flex;gap:0;align-items:stretch}
  .tabbtn{flex:0 0 auto;background:none;border:0;border-bottom:3px solid transparent;color:#7d8a99;font-family:var(--mono);font-size:13px;letter-spacing:.06em;text-transform:uppercase;font-weight:600;padding:16px 24px;cursor:pointer;transition:color .15s,border-color .15s}
  .tabbtn:hover{color:#c3ccd6}
  .tabbtn[data-on="true"]{color:#fff;border-bottom-color:var(--accent)}

  header.top{background:var(--ink);color:#eef2f6;padding:14px 22px 30px}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--accent);margin:0 0 12px}
  header.top h1{font-size:clamp(28px,4vw,46px);font-weight:700;letter-spacing:-.02em;margin:0 0 10px;line-height:1.04}
  header.top p.thesis{max-width:800px;color:#aeb9c6;font-size:15.5px;margin:0}
  header.top p.thesis b{color:#eef2f6;font-weight:600}
  .dist{margin-top:26px}
  .dist .bar{display:flex;height:34px;border-radius:6px;overflow:hidden;border:1px solid #2a3a4d}
  .dist .seg{display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:600;color:#fff;cursor:pointer;transition:filter .15s}
  .dist .seg:hover{filter:brightness(1.12)}
  .dist .labels{display:flex;justify-content:space-between;margin-top:8px;font-family:var(--mono);font-size:10.5px;color:#7d8a99;flex-wrap:wrap;gap:6px}

  .controls{position:sticky;top:53px;z-index:30;background:rgba(246,247,249,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:14px 22px}
  .controls .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .search{flex:1;min-width:200px;display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:9px 13px}
  .search input{border:0;outline:0;font-family:var(--sans);font-size:14.5px;width:100%;background:transparent;color:var(--ink)}
  .search svg{flex:0 0 auto;opacity:.5}
  .legend{display:flex;gap:6px;flex-wrap:wrap}
  .tierbtn{font-family:var(--mono);font-size:11px;font-weight:600;border:1px solid var(--line);background:var(--surface);border-radius:99px;padding:6px 11px;cursor:pointer;display:flex;align-items:center;gap:6px;color:var(--ink);transition:all .12s}
  .tierbtn .dot{width:9px;height:9px;border-radius:99px}
  .tierbtn[data-on="false"]{opacity:.34}
  .tierbtn:hover{border-color:var(--muted)}
  .toolbtn{font-family:var(--mono);font-size:11px;border:1px solid var(--line);background:var(--surface);border-radius:var(--r);padding:8px 12px;cursor:pointer;color:var(--muted)}
  .toolbtn:hover{color:var(--ink);border-color:var(--muted)}
  .cats{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}
  .catchip{font-size:12.5px;border:1px solid var(--line);background:var(--surface);border-radius:99px;padding:6px 13px;cursor:pointer;color:var(--muted);white-space:nowrap;transition:all .12s}
  .catchip[data-on="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}
  .catchip:hover{border-color:var(--muted)}

  main{max-width:1180px;margin:0 auto;padding:8px 22px 80px}
  .note{background:#fff6f3;border:1px solid #f3d3c8;border-left:4px solid var(--flag);border-radius:var(--r);padding:16px 18px;margin:22px 0;font-size:13.5px;color:#6a3326}
  .note h3{margin:0 0 6px;font-size:13px;font-family:var(--mono);letter-spacing:.04em;text-transform:uppercase;color:var(--flag)}
  .note b{color:#4d241b}
  details.method{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);margin:14px 0 6px;padding:0}
  details.method summary{cursor:pointer;padding:14px 18px;font-weight:600;font-size:14px;list-style:none}
  details.method summary::-webkit-details-marker{display:none}
  details.method summary::before{content:"+ ";font-family:var(--mono);color:var(--accent)}
  details.method[open] summary::before{content:"\2013 "}
  details.method .body{padding:0 18px 18px;font-size:13.5px;color:var(--muted)}
  details.method .body p{margin:6px 0}
  .ladder{display:grid;grid-template-columns:auto 1fr;gap:4px 12px;margin:8px 0;font-size:13px}
  .ladder .code{font-family:var(--mono);font-weight:600;padding:1px 8px;border-radius:5px;color:#fff;text-align:center;height:fit-content}

  section.cat{margin-top:34px}
  section.cat > h2{font-size:13px;font-family:var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--ink);border-bottom:2px solid var(--ink);padding-bottom:7px;margin:0 0 4px;display:flex;justify-content:space-between;align-items:baseline}
  section.cat > h2 .ct{font-size:11px;color:var(--muted);font-weight:400}
  section.cat > p.catdesc{color:var(--muted);font-size:13.5px;margin:8px 0 16px;max-width:820px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:13px}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;border-left:5px solid var(--line);transition:box-shadow .15s}
  .card:hover{box-shadow:0 4px 16px rgba(14,22,32,.07)}
  .card .head{padding:14px 15px;cursor:pointer;display:flex;gap:12px;align-items:flex-start}
  .card .head .meta{flex:1;min-width:0}
  .card .nm{font-weight:600;font-size:16px;letter-spacing:-.01em;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .card .nm .flag{color:var(--flag);font-size:13px}
  .card .alias{font-family:var(--mono);font-size:11px;color:var(--muted-2);margin-top:2px;word-break:break-word}
  .card .one{font-size:13.5px;color:var(--muted);margin-top:7px}
  .tier{flex:0 0 auto;font-family:var(--mono);font-weight:600;font-size:12px;color:#fff;width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center}
  .nonpep,.vet{font-family:var(--mono);font-size:9.5px;letter-spacing:.04em;background:#eef0f3;color:var(--muted);border:1px solid var(--line);border-radius:4px;padding:1px 5px;text-transform:uppercase}
  .card .detail{display:none;border-top:1px dashed var(--line);padding:4px 15px 16px}
  .card.open .detail{display:block}
  .card.open{box-shadow:0 6px 22px rgba(14,22,32,.1)}
  .field{margin-top:13px}
  .field .k{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:3px}
  .field .v{font-size:13.5px;color:var(--ink-2)}
  .field.warn .k{color:var(--flag)}
  .field.warn .v{color:#7a3b2e}
  .status{display:flex;flex-wrap:wrap;gap:6px;margin-top:13px}
  .pill{font-family:var(--mono);font-size:10.5px;border-radius:5px;padding:3px 8px;border:1px solid var(--line);color:var(--muted)}
  .pill.fda-y,.pill.med-y{background:#eaf6f0;border-color:#bfe6d3;color:#137a52}
  .pill.fda-n,.pill.med-n{background:#fdeeea;border-color:#f3cfc4;color:#b5402c}
  .pill.wada{background:#fff8e6;border-color:#f0dca0;color:#8a6a00}
  .empty{text-align:center;color:var(--muted);font-family:var(--mono);font-size:13px;padding:60px 0;display:none}
  footer{max-width:1180px;margin:0 auto;padding:30px 22px 60px;color:var(--muted);font-size:12px;border-top:1px solid var(--line)}
  @media (max-width:620px){.grid{grid-template-columns:1fr}.tabbtn{padding:14px 16px}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px}
</style>
</head>
<body>

<nav class="tabbar"><div class="wrap">
  <button class="tabbtn" data-tab="pep" data-on="true">Peptides</button>
  <button class="tabbtn" data-tab="ster" data-on="false">Steroids</button>
</div></nav>

<header class="top"><div class="wrap">
  <p class="eyebrow" id="eyebrow"></p>
  <h1 id="h1"></h1>
  <p class="thesis" id="thesis"></p>
  <div class="dist"><div class="bar" id="distbar"></div><div class="labels" id="distlabels"></div></div>
</div></header>

<div class="controls"><div class="wrap">
  <div class="row">
    <label class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" type="text" aria-label="Search compounds">
    </label>
    <div class="legend" id="legend"></div>
    <button class="toolbtn" id="expandAll">Expand all</button>
    <button class="toolbtn" id="collapseAll">Collapse all</button>
  </div>
  <div class="cats" id="cats"></div>
</div></div>

<main>
  <div id="noteWrap"></div>
  <div id="methodWrap"></div>
  <div id="cards"></div>
  <div class="empty" id="empty">No compounds match those filters.</div>
</main>
<footer id="footer"></footer>

<script>
const PEPTIDES = [
/* ============ TANNING / MELANOCORTIN PIGMENTATION ============ */
{cat:"Tanning & pigmentation", nm:"Afamelanotide", alias:"Melanotan I, MT-1, Scenesse", tier:"A", flag:false,
 one:"The legitimate, FDA-approved melanocortin — but approved for light protection in a rare disease, not for cosmetic tanning.",
 what:"A synthetic α-MSH analog that activates MC1R, driving eumelanin production. Approved use is photoprotection in erythropoietic protoporphyria (EPP), where it reduces phototoxic pain — the tan is a side effect, not the indication.",
 route:"Subcutaneous bioresorbable implant (~16 mg) placed by a clinician roughly every 2 months.",
 dur:"Repeated implants on an ongoing schedule under specialist care; not cycled like a research peptide.",
 caution:"Approved population is small and follow-up is limited. Darkening of existing moles occurs. Not a tanning product and not sold for that.",
 evidence:"FDA-approved 2019 (Scenesse), EMA-approved earlier. MC1R-selective, and its monitoring has not flagged a melanoma signal — but the treated population is small, so that reassurance does not automatically transfer to Melanotan II.",
 fda:"approved", wada:true},

{cat:"Tanning & pigmentation", nm:"Melanotan II", alias:"MT-2, MT-II", tier:"D", flag:true,
 one:"The popular DIY tanning peptide. No approval anywhere, non-selective across melanocortin receptors, and carries real case-report harms.",
 what:"A cyclic, non-selective melanocortin agonist (MC1R for pigment, plus MC3/MC4R, which is why it also causes spontaneous erections and appetite suppression). Tanning typically appears within ~5 doses.",
 route:"Subcutaneous injection, commonly every other day during a loading phase, then reduced; widely sold as a 'research chemical'.",
 dur:"No validated cycle. Pigment changes to moles can be permanent even after stopping.",
 caution:"Documented case reports of rhabdomyolysis and renal failure, and of new/atypical moles (dysplastic nevi — established melanoma precursors). It also darkens moles, which can mask the warning signs of skin cancer. Nausea, flushing, and the erection effect are common.",
 evidence:"Not approved by FDA, EMA, TGA or MHRA. Whether it directly causes melanoma is genuinely unsettled: case reports are confounded by heavy UV/tanning-bed use, and 2013/2021 reviews found no conclusive causal link. The stronger, less-disputed concern is induction of atypical moles plus the uncontrolled purity of street supply.",
 fda:"unapproved", wada:true},

/* ============ SEXUAL FUNCTION ============ */
{cat:"Sexual function", nm:"PT-141 (Bremelanotide)", alias:"Vyleesi, PT141", tier:"A", flag:false,
 one:"FDA-approved libido drug that works through the brain, not blood flow — but only for one narrow, well-defined group.",
 what:"A melanocortin (MC3R/MC4R) agonist derived from Melanotan II. Raises sexual desire centrally rather than affecting erections vascularly like sildenafil.",
 route:"1.75 mg subcutaneous injection, on demand ~45 min before activity (the trialed protocol). Not weight-adjusted.",
 dur:"As-needed, with a label cap of ~8 doses/month; not a daily or cycled drug.",
 caution:"Causes a transient blood-pressure rise — contraindicated in uncontrolled hypertension or known cardiovascular disease. Nausea hits ~40%. Slows gastric emptying; interacts with naltrexone. Not for pregnancy.",
 evidence:"Approved 2019 for acquired, generalized HSDD in premenopausal women, on two Phase 3 trials (RECONNECT, >1,200 women). Use in men or for general low libido is off-label and not established — sources promoting broad 'libido for everyone' use are outrunning the evidence.",
 fda:"approved", wada:false},

{cat:"Sexual function", nm:"Oxytocin", alias:"intranasal oxytocin", tier:"C", flag:false,
 one:"Endogenous bonding hormone; the injectable obstetric form is old and approved, the intranasal 'social/sexual' use is much shakier.",
 what:"A 9-amino-acid hypothalamic hormone involved in social bonding, trust, orgasm and uterine contraction. Intranasal use is studied for social cognition, anxiety and sexual function.",
 route:"Approved IV/IM form (Pitocin) for labor. Off-label intranasal sprays/troches for social or sexual effects.",
 dur:"Short half-life; effects are acute. No standardized wellness regimen.",
 caution:"Obstetric IV use is well-characterized and not interchangeable with nasal 'wellness' dosing. Intranasal results in trials are inconsistent and brain penetration is debated.",
 evidence:"The hormone itself is textbook; the intranasal social/sexual literature is mixed and often fails to replicate. Strong claims here rest on weak ground.",
 fda:"approved", wada:false},

/* ============ METABOLIC / WEIGHT ============ */
{cat:"Metabolic & weight loss", nm:"Semaglutide", alias:"Ozempic, Wegovy, Rybelsus", tier:"A", flag:false,
 one:"The drug that reset the whole category. GLP-1 receptor agonist, deeply validated.",
 what:"GLP-1 receptor agonist: boosts glucose-dependent insulin secretion, slows gastric emptying, and cuts appetite centrally. ~15% mean body-weight loss in STEP trials.",
 route:"Once-weekly subcutaneous (Ozempic/Wegovy) with stepwise titration; daily oral (Rybelsus, must be fasted, lower bioavailability).",
 dur:"Chronic; weight tends to return after stopping. Titrate up slowly to limit GI effects.",
 caution:"Nausea/vomiting/constipation common. Boxed warning for medullary thyroid carcinoma risk (rodent signal) — avoid with personal/family MTC or MEN2. Pancreatitis and gallbladder events reported.",
 evidence:"Approved for T2D and chronic weight management; cardiovascular benefit (SELECT) and MASH/fatty-liver approval (Aug 2025). Among the best-evidenced drugs on this entire list.",
 fda:"approved", wada:false},

{cat:"Metabolic & weight loss", nm:"Tirzepatide", alias:"Mounjaro, Zepbound", tier:"A", flag:false,
 one:"First approved dual GIP/GLP-1 agonist; outperforms semaglutide on weight.",
 what:"Activates both GIP and GLP-1 receptors. The dual mechanism produces larger losses (~20–22% in SURMOUNT) than GLP-1 alone.",
 route:"Once-weekly subcutaneous, 2.5–15 mg with titration.",
 dur:"Chronic, same regain-on-stop pattern as semaglutide.",
 caution:"Same GI profile and MTC boxed warning as semaglutide; effects on oral contraceptive absorption noted.",
 evidence:"Approved for T2D (2022) and obesity (2023); MASH approval early 2026. SURMOUNT-5 head-to-head favored it over semaglutide. Strong, current.",
 fda:"approved", wada:false},

{cat:"Metabolic & weight loss", nm:"Retatrutide", alias:"LY3437943", tier:"B", flag:false,
 one:"The 'triple G' — the most potent weight-loss agent yet, but still investigational.",
 what:"A single peptide agonizing GIP, GLP-1 and glucagon receptors; ~6-day half-life. The glucagon arm adds energy expenditure on top of appetite suppression.",
 route:"Once-weekly subcutaneous in trials (e.g., fixed low doses up to 12 mg).",
 dur:"Investigational; Phase 3 TRIUMPH program running through 2026.",
 caution:"GI effects are dose-driven and substantial — nausea ~42%, and high-dose discontinuation reached 12–18% in Phase 3 (some for 'excessive' weight loss). A new dysesthesia (skin sensitivity) signal appeared at high doses in Phase 3 that wasn't seen in Phase 2 — under watch.",
 evidence:"Phase 2 (NEJM 2023) showed ~24% loss at 48 wks; TRIUMPH-4 (Dec 2025) ~28.7% at 68 wks; TRIUMPH-1 ~28–30%. Not yet approved as of mid-2026 — full peer-reviewed safety still being scrutinized.",
 fda:"unapproved", wada:false},

{cat:"Metabolic & weight loss", nm:"Liraglutide", alias:"Victoza, Saxenda", tier:"A", flag:false,
 one:"The first weekly-era GLP-1; now older and weaker than its successors but fully approved.",
 what:"GLP-1 receptor agonist, same class mechanism as semaglutide but shorter-acting.",
 route:"Daily subcutaneous (1.8 mg Victoza for diabetes; 3.0 mg Saxenda for weight).",
 dur:"Chronic. Daily dosing is its main practical drawback.",
 caution:"Same GI and MTC-warning class effects; less weight loss (~5–8%) than newer agents.",
 evidence:"Long approval history and large trials. Solid but superseded.",
 fda:"approved", wada:false},

{cat:"Metabolic & weight loss", nm:"Cagrilintide", alias:"long-acting amylin analog", tier:"B", flag:false,
 one:"Amylin-pathway weight drug, mainly studied paired with semaglutide (CagriSema).",
 what:"A long-acting amylin analog that promotes satiety via a different receptor system than GLP-1, hence the combination logic.",
 route:"Weekly subcutaneous in trials.",
 dur:"Investigational.",
 caution:"GI effects; combination data still maturing and some CagriSema readouts undershot the highest expectations.",
 evidence:"Phase 2 strong; Phase 3 (CagriSema) ongoing. Not approved. Promising but not yet a known quantity.",
 fda:"unapproved", wada:false},

{cat:"Metabolic & weight loss", nm:"Survodutide", alias:"BI 456906", tier:"B", flag:false,
 one:"GLP-1/glucagon dual agonist, notable for fatty-liver (MASH) results.",
 what:"Dual GLP-1 + glucagon receptor agonist; the glucagon arm targets liver fat and energy expenditure.",
 route:"Weekly subcutaneous in trials.",
 dur:"Investigational.",
 caution:"GI effects typical of the class; long-term safety not established.",
 evidence:"Phase 2 obesity and MASH data positive; Phase 3 ongoing. Not approved.",
 fda:"unapproved", wada:false},

{cat:"Metabolic & weight loss", nm:"Mazdutide", alias:"IBI362, LY3305677", tier:"C", flag:false,
 one:"GLP-1/glucagon dual agonist developed primarily in China.",
 what:"Dual GLP-1 + glucagon agonist (an oxyntomodulin analog).",
 route:"Weekly subcutaneous in trials.",
 dur:"Investigational; furthest along in the Chinese market.",
 caution:"Western data sparse; regulatory status concentrated in China.",
 evidence:"Phase 3 mainly in China with approval there progressing; limited Western replication, so graded lower on transferable certainty.",
 fda:"unapproved", wada:false},

{cat:"Metabolic & weight loss", nm:"Orforglipron", alias:"Foundayo", tier:"A", flag:false, nonpep:true,
 one:"Oral, once-daily GLP-1 — but a small molecule, not a peptide.",
 what:"A non-peptide oral GLP-1 receptor agonist. Same downstream pathway as semaglutide without the injection or the strict fasting Rybelsus requires.",
 route:"Once-daily oral tablet.",
 dur:"Chronic.",
 caution:"GLP-1 class GI effects. Included because it's grouped with the peptide GLP-1s, but mechanistically it's a small molecule.",
 evidence:"Approved 2026 (Foundayo) for chronic weight management; beat dapagliflozin and bested semaglutide on A1c in head-to-head diabetes trials.",
 fda:"approved", wada:false},

{cat:"Metabolic & weight loss", nm:"AOD-9604", alias:"hGH 176-191", tier:"C", flag:false,
 one:"A GH fragment marketed for fat loss that's well-tested for safety — and failed to actually work.",
 what:"A 16-aa C-terminal fragment of human growth hormone meant to drive lipolysis without GH's IGF-1/glucose effects.",
 route:"Subcutaneous, often daily; sold as a research chemical.",
 dur:"No validated cycle.",
 caution:"WADA-prohibited as a GH fragment. The main 'risk' is wasted money — the human evidence is largely negative for efficacy.",
 evidence:"Six trials, ~900 participants: reassuringly clean safety (no IGF-1 rise, no glucose effect, no antibodies) but it FAILED its largest Phase 2b efficacy endpoint and development was halted in 2007. Rare on this list in being well-tested yet unimpressive.",
 fda:"unapproved", wada:true},

{cat:"Metabolic & weight loss", nm:"Tesofensine", alias:"NS2330", tier:"B", flag:false, nonpep:true,
 one:"Potent appetite suppressant — but a small-molecule triple reuptake inhibitor, not a peptide.",
 what:"Inhibits reuptake of dopamine, noradrenaline and serotonin, suppressing appetite. Grouped with weight peptides in community discussion only.",
 route:"Oral, daily.",
 dur:"Investigational.",
 caution:"Stimulant-type effects — blood pressure and heart rate rises, sleep and mood effects. Not a peptide.",
 evidence:"Phase 2 obesity results were strong; later development with phentermine (combination) advanced. Listed for completeness with the non-peptide caveat.",
 fda:"unapproved", wada:false},

/* ============ GH SECRETAGOGUES ============ */
{cat:"Growth-hormone secretagogues", nm:"Tesamorelin", alias:"Egrifta", tier:"A", flag:false,
 one:"The only FDA-approved GHRH analog.",
 what:"A stabilized GHRH analog that stimulates pulsatile GH release from the pituitary; approved to reduce visceral fat in HIV-associated lipodystrophy.",
 route:"2 mg subcutaneous daily.",
 dur:"Ongoing for the approved indication; effect reverses on stopping.",
 caution:"Raises IGF-1 — relevant to any malignancy concern; injection-site reactions, joint symptoms, fluid retention. Off-label 'anti-aging' use is unproven.",
 evidence:"Approved on Phase 3 data (NEJM 2007 + later visceral-fat studies). The class's reference point for what real GHRH evidence looks like.",
 fda:"approved", wada:true},

{cat:"Growth-hormone secretagogues", nm:"Sermorelin", alias:"GRF 1-29, Geref", tier:"C", flag:false,
 one:"Short GHRH fragment, once FDA-approved, now compounded.",
 what:"A 29-aa GHRH fragment that stimulates GH release; very short half-life (minutes). Can nudge cortisol/prolactin.",
 route:"Subcutaneous, often nightly (timed to natural GH pulses); frequently dosed multiple times.",
 dur:"Typically run in multi-month courses in clinic protocols.",
 caution:"Off-label for adult 'optimization'. Long-term adult safety data is thin. Injection-site reactions, flushing, water retention.",
 evidence:"Was FDA-approved for pediatric GH-deficiency diagnosis (withdrawn for commercial, not safety, reasons). Mechanism solid; modern adult outcome data limited and mostly clinic-reported.",
 fda:"unapproved", wada:true},

{cat:"Growth-hormone secretagogues", nm:"CJC-1295 (no DAC)", alias:"Mod GRF 1-29", tier:"C", flag:false,
 one:"Modified GHRH fragment with a ~30-min half-life — the 'cleaner pulse' GHRH most stacks use.",
 what:"GHRH analog with four substitutions for stability; binds the pituitary GHRH receptor to amplify GH pulses. Usually paired with ipamorelin.",
 route:"Subcutaneous, often once or more daily, commonly at night; research-chemical supply.",
 dur:"Run in cycles of ~2–3 months in clinic conventions.",
 caution:"No long-term human safety data for chronic combination use. Water retention, tingling, head-rush at dosing.",
 evidence:"Component PK and GH/IGF-1 responses are documented (Walker 2006 lineage), but there are no large trials of the modern stack. Dosing numbers are clinic convention, not trial-derived.",
 fda:"unapproved", wada:true},

{cat:"Growth-hormone secretagogues", nm:"CJC-1295 with DAC", alias:"CJC-1295 DAC", tier:"C", flag:false,
 one:"Long-acting GHRH analog — one shot raises GH/IGF-1 for days.",
 what:"Adds a Drug Affinity Complex that binds albumin, extending half-life so a single injection sustains GH/IGF-1 elevation for several days (a 'bleed' rather than a pulse).",
 route:"Subcutaneous, roughly once or twice weekly.",
 dur:"Cycled; the sustained elevation is a double-edged feature.",

    note:'<div class="note"><h3>Read this first</h3>This is an information reference, not medical advice and not an endorsement. The dosing and frequency figures are the <b>conventions reported in the literature or clinic/vendor sources</b> \u2014 for the unapproved compounds they are not validated, standardized, or safe to assume. Realities across the list: (1) most are sold as \u201cresearch chemicals\u201d with <b>no purity or sterility guarantee</b>; (2) in late 2023 the FDA placed ~17\u201319 of these in <b>Category 2</b> (barred from compounding), with a review of 7 of them scheduled for <b>July 23\u201324, 2026</b> and a Feb 2026 HHS statement floating a partial rollback \u2014 announced, not finalized; (3) anything that promotes tissue or blood-vessel growth carries a <b>theoretical cancer-acceleration concern</b> not ruled out in humans; (4) nearly all are <b>WADA-banned</b>, and the DoD adopts that list.</div>',
    method:'<details class="method"><summary>How the evidence tiers work, and how to read the conflicts</summary><div class="body"><p>Each compound gets a single grade for <b>evidence maturity</b> \u2014 how far it has actually been tested in humans \u2014 plus a <span style="color:var(--flag)">\u25b2 flag</span> when there\u2019s a specific safety signal beyond the general cautions.</p><div class="ladder"><span class="code" style="background:var(--tA)">A</span><span><b>Approved &amp; robust.</b> FDA or another major regulator approved it, backed by large randomized trials.</span><span class="code" style="background:var(--tB)">B</span><span><b>Strong human data.</b> Substantial human trials (Phase 2/3) but not approved for this use, or approved only outside the US.</span><span class="code" style="background:var(--tC)">C</span><span><b>Limited human data.</b> Small or dated studies, foreign approval with little Western replication, or an approved drug used far off-label.</span><span class="code" style="background:var(--tD)">D</span><span><b>Preclinical only.</b> Animal and test-tube data; little or no human evidence \u2014 where most \u201cresearch peptides\u201d sit.</span><span class="code" style="background:var(--tE)">E</span><span><b>Minimal / cautionary.</b> Anecdotal, halted, or the headline evidence was retracted.</span></div><p>Where a claim is contested it\u2019s called out in the compound\u2019s <i>Evidence &amp; disputes</i> field. Vendor/telehealth pages consistently overstate benefit; they were used for naming and dosing conventions only, with clinical/regulatory/PubMed sources weighted for safety and efficacy.</p></div></details>',

let cur = CONFIG.pep;
const state = { q:"", cat:"All", tiers:new Set(["A","B","C","D","E"]) };
const $=id=>document.getElementById(id);

function loadTab(key){
  cur = CONFIG[key];
  document.documentElement.style.setProperty('--accent', cur.accent);
  document.querySelectorAll('.tabbtn').forEach(b=>b.dataset.on = b.dataset.tab===key ? "true":"false");
  state.q=""; state.cat="All"; state.tiers=new Set(["A","B","C","D","E"]);
  $('eyebrow').innerHTML=cur.eyebrow; $('h1').textContent=cur.title; $('thesis').innerHTML=cur.thesis;
  $('search').value=""; $('search').placeholder=cur.search;
  $('noteWrap').innerHTML=cur.note; $('methodWrap').innerHTML=cur.method;
  $('footer').innerHTML='<div>'+cur.footer+'</div>';
  buildDist(); buildLegend(); buildCats(); render();
  window.scrollTo({top:0,behavior:'instant'});
}
function buildDist(){
  const counts={A:0,B:0,C:0,D:0,E:0}; cur.data.forEach(c=>counts[c.tier]++);
  const bar=$('distbar'), labels=$('distlabels'); bar.innerHTML=''; 
  ["A","B","C","D","E"].forEach(t=>{
    const seg=document.createElement('div'); seg.className='seg'; seg.style.background=cur.tiers[t].c;
    seg.style.flex=counts[t]||0.01; seg.textContent=counts[t]>1?counts[t]:(counts[t]||'');
    seg.title=t+" \u2014 "+cur.tiers[t].label+": "+counts[t];
    seg.onclick=()=>{ const only=state.tiers.size===1&&state.tiers.has(t); state.tiers=only?new Set(["A","B","C","D","E"]):new Set([t]); syncLegend(); render(); };
    bar.appendChild(seg);
  });
  labels.innerHTML=["A","B","C","D","E"].map(t=>"<span>"+t+" \u00b7 "+counts[t]+" \u00b7 "+cur.tiers[t].label+"</span>").join('')
    +"<span style=\"color:var(--accent)\">"+cur.data.length+" "+cur.distUnit+"</span>";
}
function buildLegend(){
  const legend=$('legend'); legend.innerHTML='';
  ["A","B","C","D","E"].forEach(t=>{
    const b=document.createElement('button'); b.className='tierbtn'; b.dataset.tier=t; b.dataset.on="true";
    b.innerHTML='<span class="dot" style="background:'+cur.tiers[t].c+'"></span>'+t;
    b.onclick=()=>{ state.tiers.has(t)?state.tiers.delete(t):state.tiers.add(t); if(!state.tiers.size)state.tiers=new Set(["A","B","C","D","E"]); syncLegend(); render(); };
    legend.appendChild(b);
  });
}
function syncLegend(){ $('legend').querySelectorAll('.tierbtn').forEach(b=>b.dataset.on=state.tiers.has(b.dataset.tier)?"true":"false"); }
function buildCats(){
  const catWrap=$('cats'); catWrap.innerHTML='';
  ["All",...Object.keys(cur.catDesc)].forEach(cat=>{
    const chip=document.createElement('button'); chip.className='catchip'; chip.textContent=cat; chip.dataset.on=cat==="All"?"true":"false";
    chip.onclick=()=>{ state.cat=cat; catWrap.querySelectorAll('.catchip').forEach(c=>c.dataset.on=c.textContent===cat?"true":"false"); render(); };
    catWrap.appendChild(chip);
  });
}
function matches(c){
  if(!state.tiers.has(c.tier)) return false;
  if(state.cat!=="All"&&c.cat!==state.cat) return false;
  if(state.q){
    const hay=[c.nm,c.alias,c.one,c.what,c.cat,c.prop||'',c.evidence||'',c.use||''].join(' ').toLowerCase();
    if(!hay.includes(state.q)) return false;
  }
  return true;
}
function cardHTML(c,i){
  const t=cur.tiers[c.tier];
  let fields, status;
  if(cur.kind==='pep'){
    fields='<div class="field"><div class="k">What it does</div><div class="v">'+c.what+'</div></div>'
      +'<div class="field"><div class="k">Route &amp; frequency (reported convention)</div><div class="v">'+c.route+'</div></div>'
      +'<div class="field"><div class="k">Duration &amp; cycling</div><div class="v">'+c.dur+'</div></div>'
      +'<div class="field warn"><div class="k">Cautions / don\u2019t-do</div><div class="v">'+c.caution+'</div></div>'
      +'<div class="field"><div class="k">Evidence &amp; disputes</div><div class="v">'+c.evidence+'</div></div>';
    const fda=c.fda==="approved"?'<span class="pill fda-y">FDA approved</span>':'<span class="pill fda-n">Not FDA approved</span>';
    const wada=c.wada?'<span class="pill wada">WADA banned</span>':'<span class="pill">WADA: not listed</span>';
    status=fda+wada;
  } else {
    fields='<div class="field"><div class="k">What it is / how it works</div><div class="v">'+c.what+'</div></div>'
      +'<div class="field"><div class="k">Medical &amp; real-world use</div><div class="v">'+c.use+'</div></div>'
      +'<div class="field"><div class="k">Defining property</div><div class="v">'+c.prop+'</div></div>'
      +'<div class="field warn"><div class="k">Risks (reversible vs permanent)</div><div class="v">'+c.risk+'</div></div>';
    const med=c.med?'<span class="pill med-y">Medical use</span>':'<span class="pill med-n">No accepted medical use</span>';
    const wada=c.wada?'<span class="pill wada">WADA banned</span>':'<span class="pill">WADA: not listed</span>';
    status=med+'<span class="pill">'+c.legal+'</span>'+wada;
  }
  const tag=cur.kind==='pep'?(c.nonpep?'<span class="nonpep">not a peptide</span>':''):(c.vet?'<span class="vet">veterinary origin</span>':'');
  return '<div class="card" style="border-left-color:'+t.c+'" data-i="'+i+'">'
    +'<div class="head" role="button" tabindex="0" aria-expanded="false">'
    +'<div class="tier" style="background:'+t.c+'" title="'+t.label+'">'+c.tier+'</div>'
    +'<div class="meta"><div class="nm">'+c.nm+(c.flag?'<span class="flag" title="Notable safety/harm signal">\u25b2</span>':'')+tag+'</div>'
    +'<div class="alias">'+c.alias+'</div><div class="one">'+c.one+'</div></div></div>'
    +'<div class="detail">'+fields
    +'<div class="status">'+status+'<span class="pill" style="border-color:'+t.c+';color:'+t.c+'">Tier '+c.tier+' \u00b7 '+t.label+'</span></div>'
    +'</div></div>';
}
function render(){
  const root=$('cards'), empty=$('empty');
  const shown=cur.data.map((c,i)=>({c,i})).filter(o=>matches(o.c));
  empty.style.display=shown.length?'none':'block';
  if(state.cat==="All"){
    const groups={}; shown.forEach(o=>{(groups[o.c.cat]=groups[o.c.cat]||[]).push(o);});
    root.innerHTML=Object.keys(cur.catDesc).filter(cat=>groups[cat]).map(cat=>{
      const items=groups[cat];
      return '<section class="cat"><h2>'+cat+'<span class="ct">'+items.length+' shown</span></h2>'
        +'<p class="catdesc">'+cur.catDesc[cat]+'</p><div class="grid">'+items.map(o=>cardHTML(o.c,o.i)).join('')+'</div></section>';
    }).join('');
  } else {
    root.innerHTML='<section class="cat"><h2>'+state.cat+'<span class="ct">'+shown.length+' shown</span></h2>'
      +'<p class="catdesc">'+cur.catDesc[state.cat]+'</p><div class="grid">'+shown.map(o=>cardHTML(o.c,o.i)).join('')+'</div></section>';
  }
  bindCards();
}
function bindCards(){
  $('cards').querySelectorAll('.card .head').forEach(h=>{
    const toggle=()=>{const card=h.closest('.card');const open=card.classList.toggle('open');h.setAttribute('aria-expanded',open);};
    h.onclick=toggle; h.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle();}};
  });
}
$('search').addEventListener('input',e=>{state.q=e.target.value.toLowerCase().trim();render();});
$('expandAll').onclick=()=>$('cards').querySelectorAll('.card').forEach(c=>{c.classList.add('open');c.querySelector('.head').setAttribute('aria-expanded','true');});
$('collapseAll').onclick=()=>$('cards').querySelectorAll('.card').forEach(c=>{c.classList.remove('open');c.querySelector('.head').setAttribute('aria-expanded','false');});
document.querySelectorAll('.tabbtn').forEach(b=>b.onclick=()=>loadTab(b.dataset.tab));
loadTab('pep');
</script>
</body>
</html>
